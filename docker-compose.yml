services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitpilothq}
      POSTGRES_USER: ${POSTGRES_USER:-fitpilothq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitpilothq}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitpilothq} -d ${POSTGRES_DB:-fitpilothq}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitpilothq}:${POSTGRES_PASSWORD:-fitpilothq}@db:5432/${POSTGRES_DB:-fitpilothq}?schema=public
      APP_URL: ${APP_URL:-http://localhost:3000}
      EVE_CLIENT_ID: ${EVE_CLIENT_ID:-}
      EVE_CLIENT_SECRET: ${EVE_CLIENT_SECRET:-}
      EVE_CALLBACK_URL: ${EVE_CALLBACK_URL:-http://localhost:3000/api/auth/callback}
      EVE_SCOPES: ${EVE_SCOPES:-esi-skills.read_skills.v1 esi-skills.read_skillqueue.v1}
      SESSION_SECRET: ${SESSION_SECRET:-fitpilothq-local-session-secret-change-me}
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - app-next-cache:/app/.next
    command: ["fitpilothq-entrypoint.sh"]

volumes:
  postgres-data:
  app-node-modules:
  app-next-cache:
